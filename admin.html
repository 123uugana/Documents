<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Lady Riders Mongolia admin login">
  <title>Admin Login | Lady Riders Mongolia</title>
  <link rel="icon" href="./source.jpg" type="image/jpeg">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <header class="site-header">
    <a class="logo" href="./index.html" aria-label="Lady Riders Mongolia home">
      <img src="./source.jpg" alt="" class="logo-mark" data-logo-image>
      <span>Lady Riders</span>
    </a>

    <nav class="site-nav" aria-label="Admin navigation">
      <a href="./index.html">Website</a>
    </nav>
  </header>

  <main>
    <section class="section admin-section" aria-labelledby="adminTitle">
      <form id="adminLoginForm" class="modal-content admin-login-form" autocomplete="on">
        <h1 id="adminTitle">Admin login</h1>
        <input id="adminUsername" name="username" placeholder="Username" autocomplete="username" required>
        <input id="adminPassword" name="password" type="password" placeholder="Password" autocomplete="current-password" required>
        <button type="submit">Login</button>
        <p id="adminLoginMessage" role="status" aria-live="polite"></p>
      </form>
    </section>
  </main>

  <script type="module" src="./admin.js"></script>
</body>
</html>
